# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux
            arch: x64
            ext: ""
          - goos: linux
            goarch: arm64
            platform: linux
            arch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            platform: win32
            arch: x64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            platform: darwin
            arch: x64
            ext: ""
          - goos: darwin
            goarch: arm64
            platform: darwin
            arch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o bin/axt-builder-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }} main.go

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: bin/axt-builder-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
